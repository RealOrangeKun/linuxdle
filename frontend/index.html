  <noscript>
    <h1>Linuxdle - Daily Linux Puzzle Games</h1>
    <p>Linuxdle is an interactive, browser-based daily puzzle game designed to test your knowledge of the GNU/Linux ecosystem. Since this is a modern JavaScript application, you need JavaScript enabled to play. However, here is a breakdown of what you can expect:</p>
    
    <h2>Daily Commands Module</h2>
    <p>Every day, a new Linux command is chosen. Your goal is to guess the command by interpreting a color-coded feedback grid. With each guess, you learn whether attributes like the package provider, manual section, POSIX compliance, and categories perfectly match the hidden target. You also get directional hints on the command's original release year.</p>
    
    <h2>Daily Distros Module</h2>
    <p>Linux distributions come in many flavors. In the Daily Distros challenge, you are presented with a heavily blurred logo of an operating system. As you submit incorrect guesses, the blur is progressively removed. For an extra challenge, try "LINUS_TORVALDS_MODE" which renders the logo completely grayscale and upside-down.</p>
    
    <h2>Daily Desktop Environments (DE) Module</h2>
    <p>In Linux, the graphical user interface is separated from the kernel. This module tests your visual recognition of popular Desktop Environments. You start with a screenshot of a DE. If you struggle, textual hints about the DE's underlying family, configuration language, release year, and primary programming language are revealed at certain guess thresholds.</p>

    <p>Read our official <a href="/man">Manual Page</a> for more information, or enable JavaScript to start playing!</p>
  </noscript>
