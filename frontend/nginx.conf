server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Cache-control for Main HTML
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache-control for Vite JS/CSS (immutable due to hashes)
    location ~* \.(?:css|js)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache-control for other static assets (favicons, manifest, etc.)
    location ~* \.(?:ico|png|svg|jpg|jpeg|gif|webp|woff2?|ttf|otf|map|webmanifest)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
