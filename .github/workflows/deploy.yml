name: Build and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  # e.g. RealOrangeKun
  OWNER: ${{ github.repository_owner }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Run Backend Unit Tests
        run: dotnet test backend/tests/Linuxdle.UnitTests/Linuxdle.UnitTests.csproj
      - name: Run Backend Integration Tests
        run: dotnet test backend/tests/Linuxdle.IntegrationTests/Linuxdle.IntegrationTests.csproj

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run Frontend Tests
        run: cd frontend && npm run test

  build-test-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase the repo owner name
        run: echo "OWNER_LOWER=$(echo ${{ env.OWNER }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: cd e2e && npm ci && npx playwright install --with-deps chromium

      - name: Build Docker images locally
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/linuxdle-backend:latest ./backend
          docker build -t ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/linuxdle-frontend:latest --target production ./frontend
          docker build -t ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/linuxdle-gateway:latest ./gateway

      - name: Start Environment
        # Spin up compose. It will automatically use the images we just built locally.
        run: docker compose -f docker-compose.prod.yml up -d

      - name: Wait for Environment
        run: sleep 15 # Allow services to start up completely 

      - name: Run System Tests
        run: cd e2e && npm run test
        env:
          BASE_URL: http://localhost:8081

      - name: Log in to the Container registry (Push only)
        if: github.event_name == 'push' && github.repository == 'RealOrangeKun/linuxdle'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker images
        if: github.event_name == 'push' && github.repository == 'RealOrangeKun/linuxdle'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/linuxdle-backend:latest
          docker push ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/linuxdle-frontend:latest
          docker push ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/linuxdle-gateway:latest

  deploy:
    if: github.repository == 'RealOrangeKun/linuxdle'
    needs: build-test-push
    runs-on: self-hosted
    steps:
      - name: Deploy Local
        run: |
          cd /home/yousseftarek/Projects/linuxdle
          git pull origin master
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # Pull latest images
          docker compose -f docker-compose.prod.yml pull
          # Restart services
          docker compose -f docker-compose.prod.yml up -d
          # Clean up old/dangling images to save disk space
          docker image prune -f
