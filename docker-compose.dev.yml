services:
  backend:
    container_name: linuxdle-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=Host=postgres;Database=linuxdle;Username=linuxdle;Password=linuxdle
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD:-linuxdle_redis_dev}
    volumes:
      - ./backend/src/Linuxdle.Api/wwwroot:/app/wwwroot
    depends_on:
      - postgres
      - redis
    networks:
      - linuxdle-network

  postgres:
    image: postgres:18
    container_name: linuxdle-postgres
    environment:
      - POSTGRES_DB=linuxdle
      - POSTGRES_USER=linuxdle
      - POSTGRES_PASSWORD=linuxdle
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - linuxdle-network

  redis:
    image: redis:8
    container_name: linuxdle-redis
    command: redis-server --save "" --appendonly no --requirepass ${REDIS_PASSWORD:-linuxdle_redis_dev}
    ports:
      - "6379:6379"
    networks:
      - linuxdle-network

  frontend:
    container_name: linuxdle-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - linuxdle-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: linuxdle-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - linuxdle-network

volumes:
  postgres-data:


networks:
  linuxdle-network:
    driver: bridge
