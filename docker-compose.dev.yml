services:
  backend:
    container_name: linuxdle-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=Host=postgres;Database=linuxdle;Username=linuxdle;Password=linuxdle
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD:-linuxdle_redis_dev}
    volumes:
      - ./backend/src/Linuxdle.Api/wwwroot:/app/wwwroot
    depends_on:
      - postgres
      - redis
    networks:
      - linuxdle-network

  postgres:
    image: postgres:18
    container_name: linuxdle-postgres
    environment:
      - POSTGRES_DB=linuxdle
      - POSTGRES_USER=linuxdle
      - POSTGRES_PASSWORD=linuxdle
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - linuxdle-network

  redis:
    image: redis:8
    container_name: linuxdle-redis
    command: redis-server --save "" --appendonly no --requirepass ${REDIS_PASSWORD:-linuxdle_redis_dev}
    ports:
      - "6379:6379"
    networks:
      - linuxdle-network

  frontend:
    container_name: linuxdle-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - linuxdle-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: linuxdle-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - linuxdle-network

  # Observability Stack
  grafana:
    image: grafana/grafana:latest
    container_name: linuxdle-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - linuxdle-network

  prometheus:
    image: prom/prometheus:latest
    container_name: linuxdle-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - linuxdle-network

  loki:
    image: grafana/loki:latest
    container_name: linuxdle-loki
    restart: always
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./monitoring/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"  # HTTP API for Grafana
    networks:
      - linuxdle-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: linuxdle-cadvisor
    restart: always
    privileged: true
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
      - '--disable_metrics=disk,diskIO,network,tcp,udp,percpu,sched,process'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - linuxdle-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: linuxdle-node-exporter
    restart: always
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - linuxdle-network

volumes:
  postgres-data:
  grafana-data:
  prometheus-data:
  loki-data:

networks:
  linuxdle-network:
    driver: bridge
