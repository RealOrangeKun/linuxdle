services:
  gateway:
    container_name: linuxdle-gateway
    image: ghcr.io/realorangekun/linuxdle-gateway:latest
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - backend
      - frontend
    networks:
      - linuxdle-network

  tunnel:
    container_name: linuxdle-tunnel
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - gateway
    networks:
      - linuxdle-network

  backend:
    container_name: linuxdle-backend
    image: ghcr.io/realorangekun/linuxdle-backend:latest
    restart: always
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Database=Host=postgres;Database=linuxdle;Username=linuxdle;Password=${DB_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
    volumes:
      - ./backend/src/Linuxdle.Api/wwwroot:/app/wwwroot
    depends_on:
      - postgres
      - redis
    networks:
      - linuxdle-network

  postgres:
    image: postgres:18
    container_name: linuxdle-postgres
    restart: always
    environment:
      - POSTGRES_DB=linuxdle
      - POSTGRES_USER=linuxdle
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - linuxdle-network

  redis:
    image: redis:8
    container_name: linuxdle-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - linuxdle-network

  frontend:
    container_name: linuxdle-frontend
    image: ghcr.io/realorangekun/linuxdle-frontend:latest
    restart: always
    depends_on:
      - backend
    networks:
      - linuxdle-network

  monitor:
    container_name: linuxdle-monitor
    image: alpine:latest
    restart: always
    volumes:
      - ./infrastructure/cloudflare/monitor.sh:/app/monitor.sh
      - ./infrastructure/cloudflare/maintenance-mode.sh:/app/maintenance-mode.sh
    entrypoint: /bin/sh -c "apk add --no-cache curl bash && bash /app/monitor.sh"
    depends_on:
      - backend
    networks:
      - linuxdle-network

  # Observability Stack
  grafana:
    image: grafana/grafana:latest
    container_name: linuxdle-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - linuxdle-network

  prometheus:
    image: prom/prometheus:latest
    container_name: linuxdle-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - linuxdle-network

  loki:
    image: grafana/loki:latest
    container_name: linuxdle-loki
    restart: always
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./monitoring/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    networks:
      - linuxdle-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: linuxdle-cadvisor
    restart: always
    privileged: true
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
      - '--disable_metrics=disk,diskIO,network,tcp,udp,percpu,sched,process'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - linuxdle-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: linuxdle-node-exporter
    restart: always
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - linuxdle-network

  dockge:
    image: louislam/dockge:latest
    container_name: linuxdle-dockge
    restart: always
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockge-data:/app/data
      - ${LINUXDLE_PROJECT_DIR:-.}:${LINUXDLE_PROJECT_DIR:-.}
    environment:
      - DOCKGE_STACKS_DIR=${LINUXDLE_PROJECT_DIR:-.}
    networks:
      - linuxdle-network

volumes:
  postgres-data:
  grafana-data:
  prometheus-data:
  loki-data:
  dockge-data:

networks:
  linuxdle-network:
    driver: bridge
