services:
  gateway:
    container_name: linuxdle-gateway
    build:
      context: ./gateway
    # In a tunnel setup, we don't even NEED to expose ports to the host!
    # But we'll keep 8081 for local testing if you want.
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - backend
      - frontend
    networks:
      - linuxdle-network

  tunnel:
    container_name: linuxdle-tunnel
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - gateway
    networks:
      - linuxdle-network

  backend:
    container_name: linuxdle-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Database=Host=postgres;Database=linuxdle;Username=linuxdle;Password=${DB_PASSWORD:-linuxdle}
      - ConnectionStrings__Redis=redis:6379
    volumes:
      - ./backend/src/Linuxdle.Api/wwwroot:/app/wwwroot:Z
    depends_on:
      - postgres
      - redis
    networks:
      - linuxdle-network

  postgres:
    image: postgres:18
    container_name: linuxdle-postgres
    restart: always
    environment:
      - POSTGRES_DB=linuxdle
      - POSTGRES_USER=linuxdle
      - POSTGRES_PASSWORD=${DB_PASSWORD:-linuxdle}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - linuxdle-network

  redis:
    image: redis:8
    container_name: linuxdle-redis
    restart: always
    networks:
      - linuxdle-network

  frontend:
    container_name: linuxdle-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    depends_on:
      - backend
    networks:
      - linuxdle-network

volumes:
  postgres-data:

networks:
  linuxdle-network:
    driver: bridge
