x-backend-common: &backend-common
  image: ghcr.io/realorangekun/linuxdle-backend:latest
  restart: always
  environment:
    - ASPNETCORE_URLS=http://+:8080
    - ASPNETCORE_ENVIRONMENT=Production
    - ConnectionStrings__Database=Host=postgres;Database=linuxdle;Username=linuxdle;Password=${DB_PASSWORD}
    - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
    - AccessTokenOptions__SecretKey=${JWT_SECRET}
  volumes:
    - ./backend/src/Linuxdle.Api/wwwroot:/app/wwwroot
  depends_on:
    - postgres
    - redis
  networks:
    - linuxdle-network
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
    interval: 10s
    timeout: 3s
    retries: 5
    start_period: 30s

services:
  gateway:
    container_name: linuxdle-gateway
    image: ghcr.io/realorangekun/linuxdle-gateway:latest
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - backend-blue
      - backend-green
      - frontend
    volumes:
      - ./.deploy/backend-upstream.conf:/etc/nginx/backend-upstream.conf:ro
    networks:
      - linuxdle-network

  tunnel:
    container_name: linuxdle-tunnel
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - gateway
    networks:
      - linuxdle-network

  backend-blue:
    <<: *backend-common
    container_name: linuxdle-backend-blue

  backend-green:
    <<: *backend-common
    container_name: linuxdle-backend-green

  postgres:
    image: postgres:18
    container_name: linuxdle-postgres
    restart: always
    environment:
      - POSTGRES_DB=linuxdle
      - POSTGRES_USER=linuxdle
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - linuxdle-network

  redis:
    image: redis:8
    container_name: linuxdle-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - linuxdle-network

  frontend:
    container_name: linuxdle-frontend
    image: ghcr.io/realorangekun/linuxdle-frontend:latest
    restart: always
    networks:
      - linuxdle-network

  admin-console:
    container_name: linuxdle-admin-console
    build:
      context: ./admin-console
      dockerfile: Dockerfile
    restart: always
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=linuxdle
      - DB_USER=linuxdle
      - DB_PASSWORD=${DB_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_CONSOLE_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_CONSOLE_PASSWORD}
      - ADMIN_SECRET_KEY=${ADMIN_CONSOLE_SECRET_KEY}
    ports:
      - "5055:8000"
    depends_on:
      - postgres
    networks:
      - linuxdle-network

  monitor:
    container_name: linuxdle-monitor
    image: alpine:latest
    restart: always
    environment:
      - CF_ZONE_ID=${CF_ZONE_ID}
      - CF_AUTH_EMAIL=${CF_AUTH_EMAIL}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_RULE_ID=${CF_RULE_ID}
      - CF_RULESET_ID=${CF_RULESET_ID}
    volumes:
      - ./infrastructure/cloudflare/monitor.sh:/app/monitor.sh
      - ./infrastructure/cloudflare/maintenance-mode.sh:/app/maintenance-mode.sh
    entrypoint: /bin/sh -c "apk add --no-cache curl bash && bash /app/monitor.sh"
    depends_on:
      - gateway
    networks:
      - linuxdle-network

  # Observability Stack
  grafana:
    image: grafana/grafana:latest
    container_name: linuxdle-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - linuxdle-network

  prometheus:
    image: prom/prometheus:latest
    container_name: linuxdle-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - linuxdle-network

  loki:
    image: grafana/loki:latest
    container_name: linuxdle-loki
    restart: always
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./monitoring/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    networks:
      - linuxdle-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: linuxdle-cadvisor
    restart: always
    privileged: true
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
      - '--disable_metrics=disk,diskIO,network,tcp,udp,percpu,sched,process'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - linuxdle-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: linuxdle-node-exporter
    restart: always
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - linuxdle-network

volumes:
  postgres-data:
  grafana-data:
  prometheus-data:
  loki-data:

networks:
  linuxdle-network:
    driver: bridge
