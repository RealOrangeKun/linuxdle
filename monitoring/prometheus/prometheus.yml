global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'linuxdle-prod'
    environment: 'production'

scrape_configs:
  # Backend application metrics (once you add OpenTelemetry)
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8080']
    metrics_path: '/metrics'

  # Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Host/node metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
